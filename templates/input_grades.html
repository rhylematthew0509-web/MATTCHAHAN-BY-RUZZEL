{% extends "base.html" %}

{% block content %}
<div class="container">

    <div class="card">

        <h1>Input Grades</h1>

        <form method="POST" class="grade-form">

            <div class="form-group">
                <label>Quarter</label>
                <select name="quarter" required>
                    <option value="" disabled selected>Select quarter</option>
                    <option value="Q1">Q1</option>
                    <option value="Q2">Q2</option>
                    <option value="Q3">Q3</option>
                    <option value="Q4">Q4</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Grade</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in students %}
                    <tr>
                        <td>
                            <div class="student-info">
                                <span class="student-name">{{ s[1] }}</span>
                            </div>
                        </td>
                        <td>
                            <input 
                                name="grade_{{ s[0] }}" 
                                type="number" 
                                step="0.01" 
                                min="0"
                                max="100"
                                placeholder="0.00"
                                required
                                class="grade-input"
                            >
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            {% if not students %}
            <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                </svg>
                <p>No students assigned to this section yet.</p>
            </div>
            {% endif %}

            <div class="form-actions">
                <button type="submit" class="btn-submit">Submit Grades</button>
            </div>

        </form>

        <a href="/teacher-dashboard" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Dashboard
        </a>

    </div>

</div>

{% endblock %}
