{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card">

        <h1>Subjects List</h1>

        <a href="/add-subject">➕ Add Subject</a> |
        <a href="/assign">👨‍🏫 Assign Teacher</a>

        <br><br>

        <table>
            <tr>
                <th>ID</th>
                <th>Subject</th>
                <th>Grade Level</th>
                <th>Actions</th>
            </tr>

            {% for s in subjects %}
            <tr>
                <td>{{ s[0] }}</td>
                <td>{{ s[1] }}</td>
                <td>{{ s[2] }}</td>
                <td>
                    <a href="/delete-subject/{{ s[0] }}"
                       onclick="return confirm('Are you sure you want to delete this subject?')">
                       Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>

        <br>
        <a href="/admin-dashboard">← Back to Dashboard</a>

    </div>

</div>

{% endblock %}
