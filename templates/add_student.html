{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card card-form">

        <h1>Add Student</h1>

        <form method="POST">

            <div class="form-row">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Grade Level</label>
                    <select id="gradeLevel" name="grade_level" required>
                        <option value="" disabled selected>Select Grade Level</option>
                        <option value="7">Grade 7</option>
                        <option value="8">Grade 8</option>
                        <option value="9">Grade 9</option>
                        <option value="10">Grade 10</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Section</label>
                    <select id="sectionSelect" name="section_id" required>
                        <option value="" disabled selected>Select Section</option>
                        {% for sec in sections %}
                        <option value="{{ sec[0] }}" data-grade="{{ sec[1] }}">
                            Grade {{ sec[1] }} - {{ sec[2] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit">Save</button>
            </div>

        </form>

        <a href="/students">← Back to Students List</a>

    </div>

</div>

<script>
    const gradeLevel = document.getElementById('gradeLevel');
    const sectionSelect = document.getElementById('sectionSelect');
    const allOptions = Array.from(sectionSelect.querySelectorAll('option[data-grade]'));

    gradeLevel.addEventListener('change', function() {
        const selectedGrade = this.value;
        
        // Hide all section options
        allOptions.forEach(option => {
            option.style.display = 'none';
        });

        // Show only matching sections
        if (selectedGrade) {
            allOptions.forEach(option => {
                if (option.dataset.grade === selectedGrade) {
                    option.style.display = 'block';
                }
            });
            sectionSelect.value = ''; // Reset section selection
        } else {
            // Show all if no grade selected
            allOptions.forEach(option => {
                option.style.display = 'block';
            });
        }
    });
</script>

{% endblock %}
