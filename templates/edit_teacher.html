{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card card-form">

        <h1>Edit Teacher</h1>

        <form method="POST">

            <div class="form-row">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" value="{{ teacher[1] }}" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ teacher[2] }}" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department" value="{{ teacher[3] }}" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit">Update</button>
            </div>

        </form>

        <a href="/teachers">← Back to Teachers List</a>

    </div>

</div>

{% endblock %}
