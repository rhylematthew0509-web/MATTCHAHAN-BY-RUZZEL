{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card card-form">

        <h1>Edit Section</h1>

        <form method="POST">

            <div class="form-row">
                <div class="form-group">
                    <label>Grade Level</label>
                    <select name="grade_level" required>
                        <option value="7" {% if section[1] == '7' %}selected{% endif %}>Grade 7</option>
                        <option value="8" {% if section[1] == '8' %}selected{% endif %}>Grade 8</option>
                        <option value="9" {% if section[1] == '9' %}selected{% endif %}>Grade 9</option>
                        <option value="10" {% if section[1] == '10' %}selected{% endif %}>Grade 10</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Section Name</label>
                    <input type="text" name="section_name" value="{{ section[2] }}" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit">Update</button>
            </div>

        </form>

        <a href="/sections">← Back</a>

    </div>

</div>

{% endblock %}
